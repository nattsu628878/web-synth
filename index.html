<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Synth</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>Web Synth</h1>
      <div class="header-actions">
        <div class="header-cable-sag" title="Cable sag (droop)">
          <label class="header-cable-sag__label" for="cableDroopInput">Cable sag</label>
          <input type="range" class="header-cable-sag__slider" id="cableDroopInput" min="0" max="100" value="40" aria-label="Cable sag">
          <span class="header-cable-sag__value" id="cableDroopValue">40</span>
        </div>
        <button type="button" class="header-btn" id="saveProjectBtn" title="Save project as JSON">Save</button>
        <label class="header-btn header-btn--file" for="loadProjectInput" title="Open saved JSON">Open<input type="file" id="loadProjectInput" accept=".json,application/json" hidden></label>
        <button type="button" class="theme-toggle" id="themeToggle" title="Toggle dark mode">
          <span class="theme-icon">🌙</span>
          <span class="theme-toggle-text">Dark</span>
        </button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="picker-and-preview">
      <div class="synth-picker" id="modulePicker">
        <div class="synth-picker__group">
          <span class="synth-picker__label">SOURCES</span>
          <div class="synth-picker__list-scroll">
            <div class="synth-picker__list synth-picker__list--source" id="pickerSources"></div>
          </div>
        </div>
        <div class="synth-picker__group">
          <div class="synth-picker__group-heading">
            <span class="synth-picker__label">EFFECTS</span>
            <div class="synth-picker__row-choice">
              <span class="synth-picker__row-label">Add to row</span>
              <select class="synth-picker__row-select" id="rowSelectForEffect" aria-label="Target row for effect"></select>
            </div>
          </div>
          <div class="synth-picker__list-scroll">
            <div class="synth-picker__list synth-picker__list--effect" id="pickerEffects"></div>
          </div>
        </div>
        <div class="synth-picker__group">
          <span class="synth-picker__label">MODULATORS</span>
          <div class="synth-picker__list-scroll">
            <div class="synth-picker__list synth-picker__list--modulator" id="pickerModulators"></div>
          </div>
        </div>
      </div>
      <div class="module-preview-wrapper" id="modulePreviewWrapper">
        <div class="module-preview" id="modulePreview" aria-live="polite" aria-label="Module preview">
          <span class="module-preview__placeholder" id="modulePreviewPlaceholder">Hover a module to preview</span>
          <div class="module-preview__content">
            <div class="module-preview__inner" id="modulePreviewInner"></div>
            <div class="module-preview__description" id="modulePreviewDescription" aria-live="polite"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ラック＋modulator 専用ライン＋マスター（同じ高さ） -->
    <div class="synth-rack-area">
      <div class="synth-rack" id="rackContainer">
        <div class="synth-rack__row synth-rack__header-row" aria-hidden="true">
          <div class="synth-rack__col synth-rack__col--pan"></div>
          <div class="synth-rack__col synth-rack__col--source"><span class="synth-rack__section-title">SOURCES</span></div>
          <div class="synth-rack__col synth-rack__col--chain"><span class="synth-rack__section-title">EFFECTS</span></div>
        </div>
        <div class="synth-rack__scroll" aria-label="Rack rows"></div>
      </div>
      <aside class="synth-modulators-panel" aria-label="Modulators">
        <div class="synth-modulators-panel__title">MODULATORS</div>
        <div class="synth-rack__row synth-modulators-panel__row" id="modulatorsRow" data-row-index="-2"></div>
      </aside>
      <aside class="synth-master-panel" aria-label="Master output">
        <div class="synth-master-panel__title">MASTER</div>
        <div class="synth-master-sync">
          <div class="synth-master-sync__row">
            <label class="synth-master-sync__label" for="masterBpm">BPM</label>
            <div class="synth-master-sync__bar" aria-hidden="true">
              <div class="synth-master-sync__bar-fill" id="masterBpmBarFill"></div>
            </div>
            <span class="synth-master-sync__value synth-master-sync__value--editable" id="masterBpmValue" title="Scroll to change">120</span>
          </div>
          <input type="range" class="synth-master-sync__slider synth-master-sync__slider--hidden" id="masterBpm" min="40" max="240" value="120" title="Global BPM (sync source)" aria-hidden="true">
          <div class="synth-master-sync__jack-row" title="Sync Out – drag to Sequencer Sync In">
            <div class="synth-master-sync__jack-wrap" id="masterSyncOutContainer"></div>
            <span class="synth-master-sync__jack-label">Sync Out</span>
            <span class="synth-master-sync__lamp" id="masterSyncLamp" role="img" aria-label="BPM sync indicator"></span>
          </div>
        </div>
        <div class="synth-master-volume">
          <div class="synth-master-volume__row">
            <label class="synth-master-volume__label" for="masterVolume">Vol</label>
            <div class="synth-master-volume__bar" aria-hidden="true">
              <div class="synth-master-volume__bar-fill" id="masterVolumeBarFill"></div>
            </div>
            <span class="synth-master-volume__value synth-master-volume__value--editable" id="masterVolumeValue" title="Scroll to change">0.25</span>
          </div>
          <input type="range" class="synth-master-volume__slider synth-master-volume__slider--hidden" id="masterVolume" min="0" max="100" value="25" title="Master volume" aria-hidden="true">
        </div>
        <div class="synth-master-meter">
          <div class="synth-master-meter__label-wrap">
            <span class="synth-master-meter__label">Level</span>
          </div>
          <div class="synth-master-meter__container" role="group" aria-label="Output level L R">
            <div class="synth-master-meter__scale" aria-hidden="true">
              <span class="synth-master-meter__tick" style="--pos: 0">0</span>
              <span class="synth-master-meter__tick" style="--pos: 7.1">-3</span>
              <span class="synth-master-meter__tick" style="--pos: 14.3">-6</span>
              <span class="synth-master-meter__tick" style="--pos: 21.4">-9</span>
              <span class="synth-master-meter__tick" style="--pos: 28.6">-12</span>
              <span class="synth-master-meter__tick" style="--pos: 42.9">-18</span>
              <span class="synth-master-meter__tick" style="--pos: 57.1">-24</span>
              <span class="synth-master-meter__tick" style="--pos: 71.4">-30</span>
              <span class="synth-master-meter__tick" style="--pos: 85.7">-36</span>
              <span class="synth-master-meter__tick" style="--pos: 100">-42</span>
            </div>
            <div class="synth-master-meter__segments" id="masterMeterSegmentsL" role="meter" aria-label="Left level" aria-hidden="true">
                <div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div>
            </div>
            <div class="synth-master-meter__segments" id="masterMeterSegmentsR" role="meter" aria-label="Right level" aria-hidden="true">
                <div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div><div class="synth-master-meter__segment"></div>
            </div>
          </div>
        </div>
        <div class="synth-master-correlation" role="group" aria-label="Stereo correlation">
          <div class="synth-master-correlation__label-wrap">
            <span class="synth-master-correlation__label">Correlation</span>
          </div>
          <div class="synth-master-correlation__bar-wrap">
            <div class="synth-master-correlation__track">
              <div class="synth-master-correlation__center" aria-hidden="true"></div>
              <div class="synth-master-correlation__fill" id="masterCorrelationFill" aria-hidden="true"></div>
            </div>
          </div>
        </div>
        <div class="synth-master-graph-block" data-graph="wave">
          <div class="synth-master-graph-block__head">
            <span class="synth-master-waveform__label">Wave</span>
            <div class="synth-master-waveform__wrap synth-master-graph-block__wrap">
              <canvas class="synth-master-waveform__canvas" id="masterWaveformCanvas" aria-hidden="true"></canvas>
              <button type="button" class="synth-master-graph-block__trigger" aria-label="Open settings" aria-expanded="false" title="Settings">▾</button>
            </div>
          </div>
          <div class="synth-master-graph-block__settings">
            <div class="synth-master-graph-block__settings-inner">
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Level</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="level" min="50" max="200" value="100"><span class="synth-master-graph-opts__value" data-opt-value="level">100%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Smooth</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="smoothing" min="0" max="90" value="60"><span class="synth-master-graph-opts__value" data-opt-value="smoothing">60%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Line</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="waveLineWidth" min="1" max="3" value="1"><span class="synth-master-graph-opts__value" data-opt-value="waveLineWidth">1px</span></div>
            </div>
          </div>
        </div>
        <div class="synth-master-graph-block" data-graph="spectrum">
          <div class="synth-master-graph-block__head">
            <span class="synth-master-spectrum__label">Spectrum</span>
            <div class="synth-master-spectrum__wrap synth-master-graph-block__wrap">
              <canvas class="synth-master-spectrum__canvas" id="masterSpectrumCanvas" aria-hidden="true"></canvas>
              <button type="button" class="synth-master-graph-block__trigger" aria-label="Open settings" aria-expanded="false" title="Settings">▾</button>
            </div>
          </div>
          <div class="synth-master-graph-block__settings">
            <div class="synth-master-graph-block__settings-inner">
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Level</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="level" min="50" max="200" value="100"><span class="synth-master-graph-opts__value" data-opt-value="level">100%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Smooth</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="smoothing" min="0" max="90" value="60"><span class="synth-master-graph-opts__value" data-opt-value="smoothing">60%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">FFT</label><select class="synth-master-graph-opts__select" data-opt="fftSize"><option value="512">512</option><option value="1024" selected>1024</option><option value="2048">2048</option><option value="4096">4096</option></select></div>
            </div>
          </div>
        </div>
        <div class="synth-master-graph-block" data-graph="spectrogram">
          <div class="synth-master-graph-block__head">
            <span class="synth-master-spectrogram__label">Spectrogram</span>
            <div class="synth-master-spectrogram__wrap synth-master-graph-block__wrap">
              <canvas class="synth-master-spectrogram__canvas" id="masterSpectrogramCanvas" aria-hidden="true"></canvas>
              <button type="button" class="synth-master-graph-block__trigger" aria-label="Open settings" aria-expanded="false" title="Settings">▾</button>
            </div>
          </div>
          <div class="synth-master-graph-block__settings">
            <div class="synth-master-graph-block__settings-inner">
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Level</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="level" min="50" max="200" value="100"><span class="synth-master-graph-opts__value" data-opt-value="level">100%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Smooth</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="smoothing" min="0" max="90" value="60"><span class="synth-master-graph-opts__value" data-opt-value="smoothing">60%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Decay</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="spectrogramDecay" min="0" max="98" value="0"><span class="synth-master-graph-opts__value" data-opt-value="spectrogramDecay">0%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Color</label><select class="synth-master-graph-opts__select" data-opt="spectrogramColor"><option value="default" selected>Default</option><option value="hot">Hot</option><option value="cool">Cool</option></select></div>
            </div>
          </div>
        </div>
        <div class="synth-master-graph-block" data-graph="goniometer">
          <div class="synth-master-graph-block__head">
            <span class="synth-master-goniometer__label">Goniometer</span>
            <div class="synth-master-goniometer__wrap synth-master-graph-block__wrap">
              <canvas class="synth-master-goniometer__canvas" id="masterGoniometerCanvas" aria-hidden="true"></canvas>
              <button type="button" class="synth-master-graph-block__trigger" aria-label="Open settings" aria-expanded="false" title="Settings">▾</button>
            </div>
          </div>
          <div class="synth-master-graph-block__settings">
            <div class="synth-master-graph-block__settings-inner">
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Level</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="level" min="50" max="200" value="100"><span class="synth-master-graph-opts__value" data-opt-value="level">100%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Smooth</label><div class="synth-master-graph-opts__bar"><div class="synth-master-graph-opts__bar-fill"></div></div><input type="range" class="synth-master-graph-opts__slider synth-master-graph-opts__slider--hidden" data-opt="smoothing" min="0" max="90" value="60"><span class="synth-master-graph-opts__value" data-opt-value="smoothing">60%</span></div>
              <div class="synth-master-graph-opts__row"><label class="synth-master-graph-opts__label">Grid</label><input type="checkbox" class="synth-master-graph-opts__check" data-opt="goniometerGrid" title="Show grid"></div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- キャッシュ対策: JS 変更時に ?v= の数字を増やすと確実に再読み込みされる -->
  <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
